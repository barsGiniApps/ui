name: regression-test-forked-branch

on:
  push:
    branches:
      - remote-regression-test-runs
    tags:
      - "@require-test"
  pull_request:
    types: [labeled, opened, reopened, synchronize]

jobs:
  regression-test-forked:
    name: Regression Test in forked branch
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Require Test'))
    env:
      REACT_APP_FUNCTION_CATALOG_URL: ${{ secrets.REACT_APP_FUNCTION_CATALOG_URL }}
      REACT_APP_MLRUN_API_URL: ${{ secrets.REACT_APP_MLRUN_API_URL }}
      REACT_APP_NUCLIO_API_URL: ${{ secrets.REACT_APP_NUCLIO_API_URL }}
      REACT_APP_IGUAZIO_API_URL: ${{ secrets.REACT_APP_IGUAZIO_API_URL }}

    steps:
      - name: Checkout code
        id: checkout_code
        uses: actions/checkout@v3

      - name: Test Fail Step (example forced fail)
        id: test_fail_step
        run: false

      - name: Set up Node.js
        id: setup_node
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        id: install_dependencies
        run: npm install

      - name: Run parallel tasks
        id: run_parallel_tasks
        run: |
          npm run add-comment-to-http-client &
          npm run mock-server &
          npm start &
          npm run test:regression
        continue-on-error: true

      - name: Upload test reports
        id: upload_reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tests/reports

      # Post success comment on PR
      - name: Post success comment on PR
        if: ${{ github.event_name == 'pull_request' && success() }}
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ **Regression Test in forked branch finished successfully.**"
            })

      - name: Post failure comment on PR
        if: ${{ github.event_name == 'pull_request' && failure() }}
        uses: actions/github-script@v6
        with:
          script: |
            // Collect the names of any failed steps:
            const failedSteps = [];
            
            // Check outcome of each step we care about:
            if (steps.checkout_code.outcome === 'failure') {
              failedSteps.push("Checkout code");
            }
            if (steps.test_fail_step.outcome === 'failure') {
              failedSteps.push("Test Fail Step");
            }
            if (steps.setup_node.outcome === 'failure') {
              failedSteps.push("Set up Node.js");
            }
            if (steps.install_dependencies.outcome === 'failure') {
              failedSteps.push("Install dependencies");
            }
            if (steps.run_parallel_tasks.outcome === 'failure') {
              failedSteps.push("Run parallel tasks");
            }
            if (steps.upload_reports.outcome === 'failure') {
              failedSteps.push("Upload test reports");
            }

            let body = `❌ **Regression Test workflow did NOT finish successfully.**`;
            if (failedSteps.length) {
              body += `\n**Failed step(s):** ${failedSteps.join(', ')}`;
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
