name: regression-test-forked-branch

on:
  push:
    branches:
      - remote-regression-test-runs
    tags:
      - "@require-test"
  pull_request:
    types: [labeled, opened, reopened, synchronize]

jobs:
  regression-test-forked:
    name: Regression Test in forked branch
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Require Test'))
    env:
      REACT_APP_FUNCTION_CATALOG_URL: ${{ secrets.REACT_APP_FUNCTION_CATALOG_URL }}
      REACT_APP_MLRUN_API_URL: ${{ secrets.REACT_APP_MLRUN_API_URL }}
      REACT_APP_NUCLIO_API_URL: ${{ secrets.REACT_APP_NUCLIO_API_URL }}
      REACT_APP_IGUAZIO_API_URL: ${{ secrets.REACT_APP_IGUAZIO_API_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Test Fail Step
        run: false

      - name: Run parallel tasks
        run: |
          npm run add-comment-to-http-client &
          npm run mock-server &
          npm start &
          npm run test:regression
        continue-on-error: true

      - name: Upload test reports
        id: upload-reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tests/reports

      - name: Add comment to PR
        uses: actions/github-script@v6
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const core = require('@actions/core');
            const github = require('@actions/github');
            const context = github.context;

            try {
              let commentBody = '';

              if (process.env.JOB_STATUS === 'success') {
                commentBody = 'Testing workflow finished successfully';
              } else if (process.env.JOB_STATUS === 'failure') {
                // Iterate through the steps to find the failed one
                let failedStepName = '';
                if (context.payload.workflow_run && context.payload.workflow_run.conclusion === 'failure') {
                  const jobs = await github.getOctokit(process.env.GITHUB_TOKEN).rest.actions.listJobsForWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: context.payload.workflow_run.id
                  });

                  if (jobs && jobs.data && jobs.data.jobs) {
                    const failedJob = jobs.data.jobs.find(job => job.conclusion === 'failure');
                    if (failedJob && failedJob.steps) {
                      const failedStep = failedJob.steps.find(step => step.conclusion === 'failure');
                      if (failedStep) {
                        failedStepName = failedStep.name;
                      }
                    }
                  }
                }
                commentBody = `Testing workflow failed on step: ${failedStepName}`;
              } else {
                commentBody = 'Testing workflow status is: ${{ job.status }}';
              }

              if (context.eventName === 'pull_request') {
                await github.getOctokit(process.env.GITHUB_TOKEN).rest.issues.createComment({
                  issue_number: context.payload.pull_request.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: commentBody
                });
              }
            } catch (error) {
              core.setFailed(error.message);
            }
