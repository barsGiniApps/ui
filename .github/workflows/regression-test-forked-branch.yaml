name: regression-test-forked-branch

on:
  push:
    branches:
      - remote-regression-test-runs
    tags:
      - "@require-test"
  pull_request:
    types: [labeled, opened, reopened, synchronize]

jobs:
  regression-test-forked:
    name: Regression Test in forked branch
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Require Test'))

    steps:
      - name: Checkout code
        id: checkout_code
        uses: actions/checkout@v3

      - name: Example forced fail
        id: forced_fail
        run: false  # <--- always fails (remove if not needed)

      - name: Set up Node.js
        id: setup_node
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        id: install_dependencies
        run: npm install

      - name: Run parallel tasks
        id: run_parallel_tasks
        run: |
          npm run add-comment-to-http-client &
          npm run mock-server &
          npm start &
          npm run test:regression

      - name: Post PR comment (success or failure)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const jobStatus = process.env.GITHUB_JOB_STATUS || "failure"; // the overall job status
            const failedStep = process.env.FAILED_STEP; // set by your previous "Identify first failed step" step

            if (jobStatus === 'success') {
              // Post a success comment
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "✅ **Regression Test workflow finished successfully.**"
              });
            } else {
              // Post a failure comment
              let body = "❌ **Regression Test workflow did NOT finish successfully.**";
              if (failedStep) {
                body += `\nFailed step: **${failedStep}**`;
              } else {
                body += "\nFailed step: Unknown";
              }
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
