name: regression-test-forked-branch

on:
  push:
    branches:
      - remote-regression-test-runs
    tags:
      - "@require-test"
  pull_request:
    types: [labeled, opened, reopened, synchronize]

jobs:
  regression-test-forked:
    name: Regression Test in forked branch
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Require Test'))

    steps:
      - name: Checkout code
        id: checkout_code
        uses: actions/checkout@v4

      - name: Set up Node.js
        id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install dependencies
        id: install_dependencies
        run: npm install

      - name: Run parallel tasks
        id: run_parallel_tasks
        run: |
          npm run add-comment-to-http-client &
          npm run mock-server &
          npm start &
          npm run test:regression

      - name: Upload test reports
        id: upload_reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tests/reports

      - name: Identify first failed step
        if: ${{ always() }}
        id: identify_failure_or_cancellation
        run: |
          if [ "${{ steps.checkout_code.outcome }}" = "failure" ]; then
            echo "FAILED_STEP=Checkout code" >> $GITHUB_ENV
          elif [ "${{ steps.setup_node.outcome }}" = "failure" ]; then
            echo "FAILED_STEP=Set up Node.js" >> $GITHUB_ENV
          elif [ "${{ steps.install_dependencies.outcome }}" = "failure" ]; then
            echo "FAILED_STEP=Install dependencies" >> $GITHUB_ENV
          elif [ "${{ steps.run_parallel_tasks.outcome }}" = "failure" ]; then
            echo "FAILED_STEP=Run parallel tasks" >> $GITHUB_ENV
          elif [ "${{ steps.upload_reports.outcome }}" = "failure" ]; then
            echo "FAILED_STEP=Upload test reports" >> $GITHUB_ENV
          else
            echo "FAILED_STEP=" >> $GITHUB_ENV
          fi

      - name: Post PR comment (success, failure, or cancelled)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const jobStatus = process.env.GITHUB_JOB_STATUS || "failure"; // your overall job status
            const failedStep = process.env.FAILED_STEP; // set by your previous "Identify first failed step" step

            if (jobStatus === 'success') {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "**Regression Test workflow finished successfully.** ✅"
              });
            } else if (jobStatus === 'cancelled') {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "**Regression Test workflow was cancelled.** ⚠️"
              });
            } else {
              let body = "**Regression Test workflow failed.** ❌";
              if (failedStep) {
                body += `\nFailed step: **${failedStep}**`;
              } else {
                body += "\nFailed step: Unknown";
              }
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
